<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEKA 7 Cloud</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
.card {
  background: #1e293b;
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
}
button {
  padding: 10px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  color: white;
}
input, select {
  padding: 10px;
  width: 80%;
  margin: 5px;
}
</style>
</head>

<body>

<h1>⛽ PEKA 7 CLOUD</h1>

<div class="card">
<select id="fuel">
<option value="benzine">بنزين</option>
<option value="diesel">مازوت</option>
</select>

<input id="liters" type="number" placeholder="الكمية">

<button onclick="sell()">بيع</button>

<h2 id="result">0 MRU</h2>
</div>

<div class="card">
<h3>📊 الإجمالي</h3>
<p id="total">0 MRU</p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgEOcdOgi_kzB_7HiTSxKTn0YcEyzuCIM",
  authDomain: "peka7-710b4.firebaseapp.com",
  projectId: "peka7-710b4",
  storageBucket: "peka7-710b4.firebasestorage.app",
  messagingSenderId: "619504630605",
  appId: "1:619504630605:web:90832010f3fd3e9f499504"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.sell = async function() {
  let fuel = document.getElementById("fuel").value;
  let liters = Number(document.getElementById("liters").value);

  let price = fuel === "benzine" ? 589.7 : 563.5;
  let total = liters * price;

  await addDoc(collection(db, "sales"), {
    fuel,
    liters,
    total,
    date: new Date()
  });

  document.getElementById("result").innerText = total + " MRU";
}

onSnapshot(collection(db, "sales"), (snapshot) => {
  let sum = 0;
  snapshot.forEach(doc => {
    sum += doc.data().total;
  });
  document.getElementById("total").innerText = sum + " MRU";
});

</script>

</body>
</html>
