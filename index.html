<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEKA 7 houda</title>

<style>
body {font-family: Arial; background:#0f172a; color:white; text-align:center;}
.card {background:#1e293b; padding:15px; margin:10px; border-radius:15px;}
button {padding:10px; background:#22c55e; border:none; border-radius:10px; color:white;}
input, select {padding:10px; width:80%; margin:5px;}
.hidden {display:none;}
</style>
</head>

<body>

<h1>⛽ PEKA 7 houda</h1>

<div id="login" class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">دخول</button>
</div>

<div id="app" class="hidden">

<button onclick="logout()">🚪 خروج</button>

<div class="card">
<h3>💰 المبيعات</h3>
<p id="total">0 MRU</p>
<p>عدد العمليات: <span id="count">0</span></p>
</div>

<!-- 🔥 سجل العمليات -->
<div class="card">
<h3>📋 سجل العمليات</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>📦 المخزون</h3>
<p>بنزين: <span id="stockB">0</span></p>
<p>مازوت: <span id="stockD">0</span></p>
</div>

<div class="card">
<h3>⛽ البيع</h3>
<select id="fuel">
<option value="benzine">بنزين</option>
<option value="diesel">مازوت</option>
</select>
<input id="liters" type="number" placeholder="الكمية">
<button onclick="sell()">بيع</button>
</div>

<div id="adminPanel" class="card">
<h3>⚙️ إدارة</h3>
<input id="addB" placeholder="إضافة بنزين">
<input id="addD" placeholder="إضافة مازوت">
<button onclick="addStock()">إضافة مخزون</button>
<button onclick="reset()">تصفير اليوم</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, collection, addDoc, onSnapshot,
  doc, setDoc, getDoc, updateDoc,
  query, where, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { 
  getAuth, signInWithEmailAndPassword,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgEOcdOgi_kzB_7HiTSxKTn0YcEyzuCIM",
  authDomain: "peka7-710b4.firebaseapp.com",
  projectId: "peka7-710b4",
  storageBucket: "peka7-710b4.firebasestorage.app",
  messagingSenderId: "619504630605",
  appId: "1:619504630605:web:90832010f3fd3e9f499504"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
let userRole = "worker";
let unsubscribe = null;

// 🔐 login state
onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user;

    let ref = doc(db,"users",user.uid);
    let snap = await getDoc(ref);

    if(snap.exists()){
      userRole = snap.data().role;
    }

    document.getElementById("login").style.display="none";
    document.getElementById("app").classList.remove("hidden");

    if(userRole !== "admin"){
      document.getElementById("adminPanel").style.display="none";
    }

    loadSales();
    loadHistory(); // 🔥 مهم

  } else {
    document.getElementById("login").style.display="block";
    document.getElementById("app").classList.add("hidden");
  }
});

// login
window.login = async function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth,email,password);
};

// logout
window.logout = function(){
  signOut(auth);
};

// init stock
async function initStock(){
  let ref = doc(db,"config","stock");
  let snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{benzine:1000,diesel:1000});
  }
}
initStock();

// sell
window.sell = async function(){

  let fuel = document.getElementById("fuel").value;
  let qty = Number(document.getElementById("liters").value);

  if(!qty || qty <= 0) return alert("كمية غير صحيحة");

  let ref = doc(db,"config","stock");
  let snap = await getDoc(ref);
  let stock = snap.data();

  if(fuel === "benzine" && stock.benzine < qty) return alert("المخزون غير كافي");
  if(fuel === "diesel" && stock.diesel < qty) return alert("المخزون غير كافي");

  let price = fuel === "benzine" ? 600 : 500;
  let total = qty * price;

  await addDoc(collection(db,"sales"),{
    fuel,
    quantity: qty,
    total,
    userId: currentUser.uid,
    date: new Date()
  });

  if(fuel === "benzine") stock.benzine -= qty;
  else stock.diesel -= qty;

  await updateDoc(ref,stock);

  document.getElementById("liters").value = ""; // 🔥 تنظيف

  alert("تم البيع");
};

// stock update
onSnapshot(doc(db,"config","stock"), (docSnap)=>{
  let s = docSnap.data();
  if(!s) return;

  stockB.innerText = s.benzine;
  stockD.innerText = s.diesel;
});

// sales summary
function loadSales(){

  let q = userRole === "admin"
    ? collection(db,"sales")
    : query(collection(db,"sales"), where("userId","==",currentUser.uid));

  onSnapshot(q, (snap)=>{
    let sum=0, count=0;

    snap.forEach(d=>{
      sum += d.data().total;
      count++;
    });

    total.innerText = sum + " MRU";
    countEl.innerText = count;
  });
}

// 🔥 history
function loadHistory(){

  let q = userRole === "admin"
    ? query(collection(db,"sales"), orderBy("date","desc"))
    : query(collection(db,"sales"),
        where("userId","==",currentUser.uid),
        orderBy("date","desc")
      );

  onSnapshot(q, (snap)=>{
    let html="";

    snap.forEach(d=>{
      let data = d.data();

      html += `
      <div style="margin:5px;padding:10px;background:#0f172a;border-radius:10px">
        ⛽ ${data.fuel === "benzine" ? "بنزين" : "مازوت"}<br>
        🔢 ${data.quantity} لتر<br>
        💰 ${data.total} MRU
      </div>
      `;
    });

    history.innerHTML = html;
  });
}

</script>

</body>
</html>
