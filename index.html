<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEKA 7 houda</title>

<style>
body {font-family: Arial; background:#0f172a; color:white; text-align:center;}
.card {background:#1e293b; padding:15px; margin:10px; border-radius:15px;}
button {padding:10px; background:#22c55e; border:none; border-radius:10px; color:white;}
input, select {padding:10px; width:80%; margin:5px;}
.hidden {display:none;}
</style>
</head>

<body>

<h1>⛽ PEKA 7 houda</h1>

<div id="login" class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">دخول</button>
</div>

<div id="app" class="hidden">

<button onclick="logout()">🚪 خروج</button>

<div class="card">
<h3>💰 المبيعات</h3>
<p id="total">0 MRU</p>
<p>عدد العمليات: <span id="count">0</span></p>
</div>

<div class="card">
<h3>📦 المخزون</h3>
<p>بنزين: <span id="stockB">0</span></p>
<p>مازوت: <span id="stockD">0</span></p>
</div>

<div class="card">
<h3>⛽ البيع</h3>
<select id="fuel">
<option value="benzine">بنزين</option>
<option value="diesel">مازوت</option>
</select>
<input id="liters" type="number" placeholder="الكمية">
<button onclick="sell()">بيع</button>
</div>

<div id="adminPanel" class="card">
<h3>⚙️ إدارة (فقط للمدير)</h3>
<input id="addB" placeholder="إضافة بنزين">
<input id="addD" placeholder="إضافة مازوت">
<button onclick="addStock()">إضافة مخزون</button>
<button onclick="reset()">تصفير اليوم</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, collection, addDoc, onSnapshot,
  doc, setDoc, getDoc, updateDoc,
  query, where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { 
  getAuth, signInWithEmailAndPassword,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgEOcdOgi_kzB_7HiTSxKTn0YcEyzuCIM",
  authDomain: "peka7-710b4.firebaseapp.com",
  projectId: "peka7-710b4",
  storageBucket: "peka7-710b4.firebasestorage.app",
  messagingSenderId: "619504630605",
  appId: "1:619504630605:web:90832010f3fd3e9f499504"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
let userRole = "worker";
let unsubscribe = null;

// 🔐 تسجيل الدخول + role
onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user;

    // 🔥 استخدام UID (تصحيح مهم)
    let ref = doc(db,"users",user.uid);
    let snap = await getDoc(ref);

    if(snap.exists()){
      userRole = snap.data().role;
    }

    document.getElementById("login").style.display="none";
    document.getElementById("app").classList.remove("hidden");

    if(userRole !== "admin"){
      document.getElementById("adminPanel").style.display="none";
    }

    loadSales();

  } else {
    currentUser = null;
    document.getElementById("login").style.display="block";
    document.getElementById("app").classList.add("hidden");
  }
});

// 🔑 login
window.login = async function(){
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("أدخل البيانات");
    return;
  }

  try{
    await signInWithEmailAndPassword(auth,email,password);
  }catch(e){
    alert("❌ " + e.code);
  }
};

// 🚪 logout
window.logout = function(){
  signOut(auth);
};

// 🛢️ stock init
async function initStock(){
  let ref = doc(db,"config","stock");
  let snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{benzine:1000,diesel:1000});
  }
}
initStock();

// ⛽ sell
window.sell = async function(){

  let fuel = document.getElementById("fuel").value;
  let qty = Number(document.getElementById("liters").value);

  if(!currentUser) return alert("سجل الدخول");

  if(!qty || qty <= 0){
    alert("أدخل كمية صحيحة");
    return;
  }

  let ref = doc(db,"config","stock");
  let snap = await getDoc(ref);
  let stock = snap.data();

  // 🔥 منع نقص المخزون
  if(fuel === "benzine" && stock.benzine < qty){
    alert("المخزون غير كافي");
    return;
  }

  if(fuel === "diesel" && stock.diesel < qty){
    alert("المخزون غير كافي");
    return;
  }

  let price = fuel === "benzine" ? 600 : 500;
  let total = qty * price;

  await addDoc(collection(db,"sales"),{
    fuel,
    quantity: qty,
    total,
    userId: currentUser.uid,
    email: currentUser.email,
    date: new Date()
  });

  // خصم
  if(fuel === "benzine") stock.benzine -= qty;
  else stock.diesel -= qty;

  await updateDoc(ref,stock);

  alert("تم البيع ✅");
};

// ➕ add stock
window.addStock = async function(){
  if(userRole !== "admin") return alert("ليس لديك صلاحية");

  let b = Number(document.getElementById("addB").value||0);
  let d = Number(document.getElementById("addD").value||0);

  let ref = doc(db,"config","stock");
  let snap = await getDoc(ref);
  let stock = snap.data();

  stock.benzine += b;
  stock.diesel += d;

  await updateDoc(ref,stock);
};

// 🔄 reset
window.reset = function(){
  if(userRole !== "admin") return alert("ليس لديك صلاحية");
  location.reload();
};

// 📦 stock live
onSnapshot(doc(db,"config","stock"), (docSnap)=>{
  let s = docSnap.data();
  if(!s) return;

  document.getElementById("stockB").innerText = s.benzine;
  document.getElementById("stockD").innerText = s.diesel;
});

// 💰 sales
function loadSales(){

  if(unsubscribe) unsubscribe();

  let q;

  if(userRole === "admin"){
    q = collection(db,"sales");
  } else {
    q = query(collection(db,"sales"), where("userId","==",currentUser.uid));
  }

  unsubscribe = onSnapshot(q, (snap)=>{
    let sum=0;
    let count=0;

    snap.forEach(d=>{
      let data = d.data();
      sum += data.total || 0;
      count++;
    });

    document.getElementById("total").innerText = sum + " MRU";
    document.getElementById("count").innerText = count;
  });
}

</script>

</body>
</html>
